services:
  - type: web
    name: turkiye-elektrik-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: EPTR_USERNAME
        sync: false     # Render kurulum sirasinda soracak (gizli)
      - key: EPTR_PASSWORD
        sync: false     # Render kurulum sirasinda soracak (gizli)
