name: YTBS Kurulu Guc Guncelle

on:
  schedule:
    # Her gun Turkiye saatiyle ~03:00 (UTC 00:00) - UTC kullanilir, GitHub Actions
    # cron ifadeleri her zaman UTC'dir.
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # "Actions" sekmesinden elle de tetiklenebilir (test icin)

jobs:
  guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklari kur
        run: pip install requests openpyxl

      - name: YTBS'den kurulu guc verisini cek
        working-directory: backend
        run: python ytbs_kurulu_guc_guncelle.py

      - name: Degisiklik varsa commit + push et
        working-directory: backend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kurulu_guc_guncel.json
          git diff --cached --quiet && echo "Degisiklik yok, push atlaniyor." || (
            git commit -m "otomatik (GitHub Actions): kurulu guc guncellendi"
            git push
          )
